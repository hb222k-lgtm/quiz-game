<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>탐험 퀴즈 게임</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(160deg, #f3f0ff 0%, #ede9fe 40%, #fdf2ff 100%); min-height: 100vh; }
    .page { padding-top: 0; }
    .hero { padding: 60px 0 32px; }
    .info-chips { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .chip {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 1.5px solid #ddd6fe;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px; font-weight: 600; color: #4c1d95;
    }
    .chip span { font-size: 20px; }
    #saved-name { font-weight: 900; font-size: 22px; background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-icon">🗺️</div>
      <h1>탐험 퀴즈 게임</h1>
      <p>지도의 장소를 찾아가서<br>퀴즈를 풀고 포인트를 모으세요!</p>
    </div>

    <div class="card" id="login-card">
      <div class="form-group">
        <label for="name-input">닉네임</label>
        <input type="text" id="name-input" placeholder="사용할 닉네임을 입력하세요"
          maxlength="12" autocomplete="off" autocorrect="off">
      </div>
      <button class="btn btn-primary" onclick="startGame()">게임 시작 🚀</button>
    </div>

    <div class="card" id="continue-card" style="display:none; text-align:center;">
      <p class="text-muted mb-8" style="font-size:13px;">이전 참여 기록이 있어요</p>
      <p id="saved-name" style="margin-bottom:18px;"></p>
      <button class="btn btn-primary" onclick="continueGame()">이어서 하기 →</button>
      <button class="btn btn-outline mt-8" onclick="newGame()">다른 닉네임으로 시작</button>
    </div>

    <div class="info-chips">
      <div class="chip"><span>📍</span> 장소에 직접 방문해야 퀴즈가 열려요</div>
      <div class="chip"><span>📱</span> QR 코드 스캔으로도 포인트 획득!</div>
      <div class="chip"><span>🏆</span> 포인트 1등이 최후의 승자!</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script>
    const saved = getNickname();
    if (saved) {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('continue-card').style.display = 'block';
      document.getElementById('saved-name').textContent = saved;
    }

    function newGame() {
      clearNickname();
      document.getElementById('continue-card').style.display = 'none';
      document.getElementById('login-card').style.display = 'block';
    }

    function continueGame() {
      window.location.href = 'map.html';
    }

    async function startGame() {
      const input = document.getElementById('name-input');
      const name = input.value.trim();
      if (!name) { showToast('닉네임을 입력해주세요'); return; }
      if (name.length < 2) { showToast('닉네임은 2자 이상이어야 해요'); return; }

      const btn = document.querySelector('.btn-primary');
      btn.textContent = '확인 중...';
      btn.disabled = true;

      try {
        // 닉네임 중복 체크
        const snap = await db.collection('participants').doc(name).get();
        if (snap.exists) {
          // 기존 참가자 → 이어서
          setNickname(name);
          window.location.href = 'map.html';
          return;
        }

        // 신규 참가자 등록
        await db.collection('participants').doc(name).set({
          nickname: name,
          points: 0,
          completedLocations: [],
          scannedQRs: [],
          joinedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        setNickname(name);
        window.location.href = 'map.html';
      } catch (e) {
        showToast('오류가 발생했어요. 다시 시도해주세요.');
        btn.textContent = '게임 시작하기 →';
        btn.disabled = false;
      }
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startGame();
    });
  </script>
</body>
</html>
